services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "18789:18789"
    volumes:
      - ./config:/home/node/.openclaw
    environment:
      - OPENCLAW_AUTH_TOKEN=MojeHaslo2026!
      - OPENCLAW_BIND=0.0.0.0
      - OPENCLAW_ALLOWED_ORIGINS=*
      - NODE_ENV=production

  trading_db:
    image: timescale/timescaledb:latest-pg15
    container_name: trading_db
    restart: always
    environment:
      - POSTGRES_PASSWORD=TwojeSilneHaslo123
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - openclaw_network

  trading_worker:
    build: .
    container_name: trading_worker
    volumes:
      - /home/ubuntu/openclaw/workspace:/app
    environment:
      - DATABASE_URL=postgresql://postgres:TwojeSilneHaslo123@trading_db:5432/postgres

    working_dir: /app
    command: tail -f /dev/null
    networks:
      - openclaw_network

networks:
  openclaw_network:
    driver: bridge
